
services:
  backend:
    image: ${DOCKERHUB_USERNAME}/${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - storage-public:/var/www/html/storage/app/public
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - storage-public:/var/www/html/public/storage:ro
    networks:
      - app-network
      - monitoring
    depends_on:
      - backend

  frontend:
    image: ${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - app-network

  edge:
    image: nginx:alpine
    container_name: app_edge
    restart: unless-stopped
    volumes:
      - ./nginx/edge.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security-headers.conf:/etc/nginx/snippets/security-headers.conf:ro
    networks:
      - app-network
      - web
    depends_on:
      - frontend
      - nginx

  db:
    image: postgres:18-alpine
    container_name: app_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    name: app-network
    driver: bridge
  web:
    external: true
  monitoring:
    name: monitoring
    external: true

volumes:
  db-data:
    driver: local
  storage-public:
    driver: local
