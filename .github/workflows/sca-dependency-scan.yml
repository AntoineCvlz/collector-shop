on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  sca-dependency-scan:
    name: SCA - Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      # ═══════════════════════════════════════
      # 1. COMPOSER AUDIT (Le remplaçant natif de l'OWASP pour PHP)
      # ═══════════════════════════════════════
      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: 📦 Composer Audit (Native Laravel SCA) — bloquant
        run: composer audit --locked --format=plain

      # ═══════════════════════════════════════
      # 2. TRIVY SCA (Analyse des fichiers lock)
      # ═══════════════════════════════════════
      # Run 1 : rapport complet (CRITICAL/HIGH/MEDIUM) → onglet Security, non bloquant
      - name: 🔍 Trivy SCA — rapport SARIF
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: backend
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true
          exit-code: "0"

      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: trivy-results.sarif
          category: trivy-sca

      # Run 2 : gate bloquant sur CRITICAL/HIGH corrigeables
      - name: 🚦 Trivy SCA — gate (CRITICAL/HIGH bloquant)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: backend
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"