on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  mutation-tests:
    name: 🧬 Mutation Tests (Infection PHP)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pgsql, pdo_pgsql, zip, bcmath
          coverage: xdebug
          tools: composer:v2
      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: ⚙️ Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🗄️ Run migrations
        run: php artisan migrate --force --no-interaction
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🔧 Install Infection PHP
        run: composer require --dev infection/infection --no-interaction --quiet

      - name: 🧪 Run initial tests
        run: vendor/bin/pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 📊 Generate coverage for Infection
        run: |
          mkdir -p /tmp/infection-coverage
          vendor/bin/pest \
            --coverage-xml=/tmp/infection-coverage/coverage-xml \
            --log-junit=/tmp/infection-coverage/junit.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🔧 Fix Pest prefix in junit.xml
        run: sed -i 's/P\\Tests\\/Tests\\/g' /tmp/infection-coverage/junit.xml

      - name: 🧬 Run Infection PHP
        run: |
          vendor/bin/infection \
            --coverage=/tmp/infection-coverage \
            --skip-initial-tests \
            --min-msi=50 \
            --min-covered-msi=70 \
            --threads=$(nproc) \
            --no-progress \
            --logger-html=infection-report.html
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 📊 Upload Infection report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: infection-report
          path: backend/infection-report.html
          retention-days: 7
