on:
  workflow_call:

permissions:
  contents: read

jobs:
  unused-deps:
    name: Unused Deps - Backend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2, composer-unused

      - name: 📦 Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: 🧹 composer-unused — bloquant
        run: composer-unused --no-progress
