# ─────────────────────────────────────────────────────────────
# Production — VPS unique (1 environnement : production)
#
# Diffère du docker-compose.yaml de dev :
#   - on PULL les images depuis Docker Hub (publiées par la CI) au lieu de builder
#   - pas de volumes de code monté (images immuables)
#   - frontend buildé statique (pas le mode Vite dev)
#   - nginx-edge = point d'entrée de CETTE appli, joint via le proxy Caddy
#     (réseau externe "web") qui termine le TLS. app_edge n'expose donc
#     plus de port sur l'hôte (cf. docker/proxy/ pour le frontal partagé).
#
# Variables attendues dans /opt/collector-shop/.env (cf. .env.prod.example) :
#   DOCKERHUB_USERNAME, BACKEND_IMAGE, FRONTEND_IMAGE, IMAGE_TAG,
#   DB_DATABASE, DB_USERNAME, DB_PASSWORD,
#   APP_KEY, APP_URL, et toute autre variable Laravel.
# ─────────────────────────────────────────────────────────────

services:
  # --- BACKEND (Laravel / PHP 8.4 FPM) ---
  backend:
    image: ${DOCKERHUB_USERNAME}/${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_backend
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Uploads (images d'articles) persistés + partagés avec nginx qui les sert.
      - storage-public:/var/www/html/storage/app/public
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  # --- NGINX du backend (sert PHP-FPM, comme en dev) ---
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # Même volume que le backend, monté là où nginx le sert directement
      # (root /var/www/html/public + requête /storage → ce dossier).
      # Évite de dépendre d'un symlink storage:link cross-conteneur.
      - storage-public:/var/www/html/public/storage:ro
    networks:
      - app-network
    depends_on:
      - backend

  # --- FRONTEND (React/Vite buildé, servi par son nginx interne :8080) ---
  frontend:
    image: ${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - app-network

  # --- NGINX EDGE (entrée de l'appli, derrière le proxy Caddy) ---
  # Pas de port publié sur l'hôte : Caddy (réseau "web") le joint
  # par son nom de conteneur (app_edge:80) et termine le TLS.
  edge:
    image: nginx:alpine
    container_name: app_edge
    restart: unless-stopped
    volumes:
      - ./nginx/edge.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network   # parle au frontend/backend internes
      - web           # joignable par le proxy Caddy frontal
    depends_on:
      - frontend
      - nginx

  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:18-alpine
    container_name: app_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - db-data:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge
  # Réseau frontal partagé entre le proxy Caddy et toutes les applis.
  # Créé une fois sur le VPS :  docker network create web
  web:
    external: true

volumes:
  db-data:
    driver: local
  # Uploads d'images d'articles, partagés backend ⇄ nginx (cf. /storage).
  storage-public:
    driver: local
