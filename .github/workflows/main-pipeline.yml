name: Main CI/CD Pipeline

# Pipeline UNIQUE back + front : les deux voies (build/test/scan/publish) tournent
# en parallèle, puis un SEUL déploiement orchestré met toute la stack en prod
# (back → healthcheck → front → healthcheck). Fusionné pour supprimer tout skew
# front/back : on ne déploie jamais l'un sans l'autre validé. Sur une stack
# mono-VPS partagée (même docker-compose.prod.yaml), c'est le bon niveau.
on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - "frontend/**"
      - "docker/**"
      - ".github/workflows/**"
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read
  actions: read
  id-token: write

jobs:
  # ═══════════════════════════════════════════════
  # ÉTAPE 1 : BUILD & TESTS
  # ═══════════════════════════════════════════════
  build-and-test:
    uses: ./.github/workflows/build-unit-tests.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 2 : QUALITÉ & SÉCURITÉ
  # ═══════════════════════════════════════════════
  code-quality-sast:
    needs: build-and-test
    uses: ./.github/workflows/code-quality-sast.yml
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 3 : DÉTECTION DE SECRETS
  # ═══════════════════════════════════════════════
  secret-scanning:
    needs: build-and-test
    uses: ./.github/workflows/secret-scanning.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 4 : ANALYSE DES DÉPENDANCES (SCA)
  # ═══════════════════════════════════════════════
  sca-dependency-scan:
    needs: build-and-test
    uses: ./.github/workflows/sca-dependency-scan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5 : SÉCURITÉ INFRASTRUCTURE AS CODE
  # ═══════════════════════════════════════════════
  secure-iac-dockerfile-scan:
    needs: build-and-test
    uses: ./.github/workflows/secure-iac-dockerfile-scan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5b : PHPSTAN SAST
  # ═══════════════════════════════════════════════
  phpstan:
    needs: build-and-test
    uses: ./.github/workflows/phpstan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5c : MUTATION TESTS (push uniquement, trop lent pour les PRs)
  # ═══════════════════════════════════════════════
  mutation-tests:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/mutation-tests.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 6 : BUILD & SCAN DOCKER
  # ═══════════════════════════════════════════════
  build-and-scan-docker:
    needs: [code-quality-sast, secret-scanning, secure-iac-dockerfile-scan, sca-dependency-scan, phpstan]
    uses: ./.github/workflows/build-docker-image.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 7 : PUBLICATION DOCKER HUB
  # ═══════════════════════════════════════════════
  publish-docker-hub:
    needs: [build-and-scan-docker]
    uses: ./.github/workflows/publish-docker-hub.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 8 : DAST (Après publication Docker Hub)
  # ═══════════════════════════════════════════════
  dast-zap-test:
    needs: publish-docker-hub
    uses: ./.github/workflows/dast-zap-test.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}

  # ═══════════════════════════════════════════════════════════════════
  # VOIE FRONTEND — s'exécute EN PARALLÈLE de la voie back ci-dessus.
  # Réutilise les mêmes workflows que l'ancien pipeline front (supprimé).
  # ═══════════════════════════════════════════════════════════════════

  # ÉTAPE F1 : BUILD & TESTS FRONTEND
  build-and-test-front:
    uses: ./.github/workflows/build-unit-tests-front.yml

  # ÉTAPE F2 : QUALITÉ & SÉCURITÉ FRONTEND
  code-quality-sast-front:
    needs: build-and-test-front
    uses: ./.github/workflows/code-quality-sast-front.yml
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ÉTAPE F3 : SCA FRONTEND
  sca-dependency-scan-front:
    needs: build-and-test-front
    uses: ./.github/workflows/sca-dependency-scan-front.yml

  # ÉTAPE F4 : SÉCURITÉ DOCKERFILE FRONT
  secure-iac-dockerfile-scan-front:
    needs: build-and-test-front
    uses: ./.github/workflows/secure-iac-dockerfile-scan-front.yml

  # ÉTAPE F5 : CODEQL SAST FRONTEND
  codeql-front:
    needs: build-and-test-front
    uses: ./.github/workflows/codeql-front.yml

  # ÉTAPE F6 : E2E PLAYWRIGHT
  e2e-playwright-front:
    needs: build-and-test-front
    uses: ./.github/workflows/e2e-playwright-front.yml

  # ÉTAPE F7 : LIGHTHOUSE CI (perf / a11y / SEO)
  lighthouse-ci-front:
    needs: build-and-test-front
    uses: ./.github/workflows/lighthouse-ci-front.yml

  # ÉTAPE F8 : BUILD & SCAN DOCKER FRONT
  build-and-scan-docker-front:
    needs: [code-quality-sast-front, secret-scanning, secure-iac-dockerfile-scan-front, sca-dependency-scan-front, codeql-front, e2e-playwright-front, lighthouse-ci-front]
    uses: ./.github/workflows/build-docker-image-front.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME_FRONT }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ÉTAPE F9 : PUBLICATION DOCKER HUB FRONT
  publish-docker-hub-front:
    needs: [build-and-scan-docker-front]
    uses: ./.github/workflows/publish-docker-hub-front.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME_FRONT }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ÉTAPE F10 : DAST FRONT (après publication)
  dast-zap-test-front:
    needs: publish-docker-hub-front
    uses: ./.github/workflows/dast-zap-test-front.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME_FRONT }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 9 : DÉPLOIEMENT PRODUCTION (VPS unique — stack COMPLÈTE, orchestrée)
  # Uniquement sur push main (pas sur les PRs)
  # ═══════════════════════════════════════════════
  # Le déploiement attend que TOUTE la CI back ET front soit verte :
  #   - dast-zap-test / mutation-tests : voie back validée
  #   - dast-zap-test-front            : voie front validée
  # → on ne déploie JAMAIS un skew (back sans front ou l'inverse). deploy.yml
  #   orchestre ensuite back → healthcheck → front → healthcheck.
  deploy:
    needs: [dast-zap-test, mutation-tests, dast-zap-test-front]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      backend_image: ${{ vars.DEPLOY_APPLI_NAME }}
      frontend_image: ${{ vars.DEPLOY_APPLI_NAME_FRONT }}
    # `inherit` est REQUIS ici (et non un raccourci) : les secrets SSH_*/GF_*/
    # MONITORING_* sont scopés à l'environnement "production", que seul le
    # workflow APPELÉ (deploy.yml) déclare. Un job qui `uses:` un reusable
    # workflow ne peut PAS déclarer lui-même `environment:` (interdit par
    # GitHub) → il ne pourrait pas résoudre ces secrets pour les passer un à un.
    # `inherit` les transmet en les laissant se résoudre côté deploy.yml.
    # La portée reste bornée : deploy.yml ne tourne que sur push main, après
    # approbation manuelle de l'environnement production.
    secrets: inherit

  # ═══════════════════════════════════════════════
  # ÉTAPE 10 : Notifications (toujours exécuté, même en cas d'échec)
  # ═══════════════════════════════════════════════
  send-notifications:
    needs:
      - build-and-test
      - code-quality-sast
      - secret-scanning
      - sca-dependency-scan
      - secure-iac-dockerfile-scan
      - phpstan
      - mutation-tests
      - build-and-scan-docker
      - publish-docker-hub
      - dast-zap-test
      # Voie front : les notifications attendent AUSSI la fin de la CI front.
      # (Les résultats front ne sont pas encore inclus dans le mail : le
      # workflow send-notifications.yml n'accepte que les inputs back. À
      # étendre si tu veux le détail front dans la notification.)
      - build-and-test-front
      - code-quality-sast-front
      - sca-dependency-scan-front
      - secure-iac-dockerfile-scan-front
      - codeql-front
      - e2e-playwright-front
      - lighthouse-ci-front
      - build-and-scan-docker-front
      - publish-docker-hub-front
      - dast-zap-test-front
    uses: ./.github/workflows/send-notifications.yml
    if: always()
    secrets:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      # Voie back
      result_build_and_test: ${{ needs.build-and-test.result }}
      result_code_quality_sast: ${{ needs.code-quality-sast.result }}
      result_secret_scanning: ${{ needs.secret-scanning.result }}
      result_sca_dependency_scan: ${{ needs.sca-dependency-scan.result }}
      result_secure_iac_dockerfile_scan: ${{ needs.secure-iac-dockerfile-scan.result }}
      result_phpstan: ${{ needs.phpstan.result }}
      result_mutation_tests: ${{ needs.mutation-tests.result }}
      result_build_and_scan_docker: ${{ needs.build-and-scan-docker.result }}
      result_publish_docker_hub: ${{ needs.publish-docker-hub.result }}
      result_dast_zap_test: ${{ needs.dast-zap-test.result }}
      # Voie front
      result_build_and_test_front: ${{ needs.build-and-test-front.result }}
      result_code_quality_sast_front: ${{ needs.code-quality-sast-front.result }}
      result_sca_dependency_scan_front: ${{ needs.sca-dependency-scan-front.result }}
      result_secure_iac_dockerfile_scan_front: ${{ needs.secure-iac-dockerfile-scan-front.result }}
      result_codeql_front: ${{ needs.codeql-front.result }}
      result_e2e_playwright_front: ${{ needs.e2e-playwright-front.result }}
      result_lighthouse_ci_front: ${{ needs.lighthouse-ci-front.result }}
      result_build_and_scan_docker_front: ${{ needs.build-and-scan-docker-front.result }}
      result_publish_docker_hub_front: ${{ needs.publish-docker-hub-front.result }}
      result_dast_zap_test_front: ${{ needs.dast-zap-test-front.result }}
