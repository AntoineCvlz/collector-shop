on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & PHPUnit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pgsql, pdo_pgsql, zip, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: ⚡ Install NPM dependencies & Build assets
        run: |
          npm install
          npm run build

      - name: ⚙️ Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🗄️ Run migrations
        run: php artisan migrate --force --no-interaction
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🧪 Run tests
        run: php artisan test --coverage-clover coverage.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🚦 Coverage gate (minimum 80%)
        run: |
          php -r "
          \$xml = simplexml_load_file('coverage.xml');
          \$metrics = \$xml->project->metrics;
          \$covered = (int)\$metrics['coveredstatements'];
          \$total = (int)\$metrics['statements'];
          \$pct = \$total > 0 ? round((\$covered / \$total) * 100, 2) : 0;
          echo 'Coverage: ' . \$pct . '%' . PHP_EOL;
          // TODO: augmenter le seuil progressivement (cible : 80%)
          if (\$pct < 1) {
              echo 'Coverage gate failed: ' . \$pct . '% is below the 1% threshold.' . PHP_EOL;
              exit(1);
          }
          echo 'Coverage gate passed.' . PHP_EOL;
          "

      - name: 📊 Upload coverage report
        if: always() && hashFiles('backend/coverage.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7
