name: Main CI/CD Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"
      - ".github/workflows/**"
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read
  actions: read
  id-token: write

jobs:
  # ═══════════════════════════════════════════════
  # ÉTAPE 1 : BUILD & TESTS
  # ═══════════════════════════════════════════════
  build-and-test:
    uses: ./.github/workflows/build-unit-tests.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 2 : QUALITÉ & SÉCURITÉ
  # ═══════════════════════════════════════════════
  code-quality-sast:
    needs: build-and-test
    uses: ./.github/workflows/code-quality-sast.yml
    secrets:
      SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 3 : DÉTECTION DE SECRETS
  # ═══════════════════════════════════════════════
  secret-scanning:
    needs: build-and-test
    uses: ./.github/workflows/secret-scanning.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 4 : ANALYSE DES DÉPENDANCES (SCA)
  # ═══════════════════════════════════════════════
  sca-dependency-scan:
    needs: build-and-test
    uses: ./.github/workflows/sca-dependency-scan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5 : SÉCURITÉ INFRASTRUCTURE AS CODE
  # ═══════════════════════════════════════════════
  secure-iac-dockerfile-scan:
    needs: build-and-test
    uses: ./.github/workflows/secure-iac-dockerfile-scan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5b : PHPSTAN SAST
  # ═══════════════════════════════════════════════
  phpstan:
    needs: build-and-test
    uses: ./.github/workflows/phpstan.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 5c : MUTATION TESTS (push uniquement, trop lent pour les PRs)
  # ═══════════════════════════════════════════════
  mutation-tests:
    needs: build-and-test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/mutation-tests.yml

  # ═══════════════════════════════════════════════
  # ÉTAPE 6 : BUILD & SCAN DOCKER
  # ═══════════════════════════════════════════════
  build-and-scan-docker:
    needs: [code-quality-sast, secret-scanning, secure-iac-dockerfile-scan, sca-dependency-scan, phpstan]
    uses: ./.github/workflows/build-docker-image.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 7 : PUBLICATION DOCKER HUB
  # ═══════════════════════════════════════════════
  publish-docker-hub:
    needs: [build-and-scan-docker]
    uses: ./.github/workflows/publish-docker-hub.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 8 : DAST (Après publication Docker Hub)
  # ═══════════════════════════════════════════════
  dast-zap-test:
    needs: publish-docker-hub
    uses: ./.github/workflows/dast-zap-test.yml
    with:
      app_name: ${{ vars.DEPLOY_APPLI_NAME }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}

  # ═══════════════════════════════════════════════
  # ÉTAPE 9 : DÉPLOIEMENT PRODUCTION (VPS unique, back + front)
  # Uniquement sur push main (pas sur les PRs)
  # ═══════════════════════════════════════════════
  deploy:
    needs: dast-zap-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy.yml
    with:
      backend_image: ${{ vars.DEPLOY_APPLI_NAME }}
      frontend_image: ${{ vars.DEPLOY_APPLI_NAME_FRONT }}
    # inherit : transmet TOUS les secrets (repo + environnement production),
    # dont SSH_HOST / SSH_USER / SSH_PRIVATE_KEY requis par appleboy/*-action.
    # L'appel explicite ne passait que DOCKERHUB_USERNAME, d'où l'erreur
    # "can't connect without a private SSH key or password".
    secrets: inherit

  # ═══════════════════════════════════════════════
  # ÉTAPE 10 : Notifications (toujours exécuté, même en cas d'échec)
  # ═══════════════════════════════════════════════
  send-notifications:
    needs:
      - build-and-test
      - code-quality-sast
      - secret-scanning
      - sca-dependency-scan
      - secure-iac-dockerfile-scan
      - phpstan
      - mutation-tests
      - build-and-scan-docker
      - publish-docker-hub
      - dast-zap-test
    uses: ./.github/workflows/send-notifications.yml
    if: always()
    secrets:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      MAIL_TO: ${{ secrets.MAIL_TO }}
    with:
      result_build_and_test: ${{ needs.build-and-test.result }}
      result_code_quality_sast: ${{ needs.code-quality-sast.result }}
      result_secret_scanning: ${{ needs.secret-scanning.result }}
      result_sca_dependency_scan: ${{ needs.sca-dependency-scan.result }}
      result_secure_iac_dockerfile_scan: ${{ needs.secure-iac-dockerfile-scan.result }}
      result_phpstan: ${{ needs.phpstan.result }}
      result_mutation_tests: ${{ needs.mutation-tests.result }}
      result_build_and_scan_docker: ${{ needs.build-and-scan-docker.result }}
      result_publish_docker_hub: ${{ needs.publish-docker-hub.result }}
      result_dast_zap_test: ${{ needs.dast-zap-test.result }}
