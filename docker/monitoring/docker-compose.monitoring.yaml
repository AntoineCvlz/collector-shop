
services:
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: mon_prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
    depends_on:
      - node-exporter
      - cadvisor

  grafana:
    image: grafana/grafana:11.4.0
    container_name: mon_grafana
    restart: unless-stopped
    env_file:
      - .env
    environment:
      GF_SERVER_ROOT_URL: https://grafana.antoine-cuvilliez.fr
      GF_SERVER_ENFORCE_DOMAIN: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD requis}
      GF_ALERT_EMAIL_TO: ${GF_ALERT_EMAIL_TO:-alerts@example.invalid}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring   # parle à Prometheus
      - web          # joignable par le proxy Caddy frontal
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: mon_node_exporter
    restart: unless-stopped
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: mon_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - monitoring

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16.0
    container_name: mon_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: ${DATA_SOURCE_NAME:?DATA_SOURCE_NAME requis (connexion à app_db)}
    networks:
      - monitoring     # scrapé par Prometheus
      - app-network    # joint la base app_db

networks:
  monitoring:
    name: monitoring
    external: true
  web:
    external: true
  app-network:
    name: app-network
    external: true

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
