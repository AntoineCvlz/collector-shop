server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Ne pas divulguer la version de nginx (Server: nginx/x.y.z → Server: nginx).
    server_tokens off;

    # ── En-têtes de sécurité (durcissement DAST/ZAP) ──────────────────
    # Appliqués à toutes les réponses, y compris les pages d'erreur (always).
    #
    # CSP : le SPA ne charge que ses propres assets. Les polices (Plus Jakarta
    # Sans) sont self-hébergées via @fontsource et servies en same-origin, donc
    # plus aucune origine Google (fonts.googleapis.com / fonts.gstatic.com).
    # Les anciens style={{...}} de React ont été remplacés par des classes
    # Tailwind statiques, donc plus besoin de 'unsafe-inline' sur style-src.
    # connect-src 'self' : l'API est same-origin en prod (/api via l'edge). Si un
    # jour VITE_API_BASE_URL pointe vers une origine externe, l'ajouter ici.
    # font-src data: : certains sous-fichiers @fontsource (ex. subset cyrillic-ext
    # italic, ~1.7 Ko) passent sous le seuil assetsInlineLimit de Vite et sont
    # donc inlinés en data URI dans le CSS buildé plutôt que servis en fichier.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # Assets Vite hashés (JS/CSS/fonts/images dans /assets) : immuables,
    # cache long sans revalidation. index.html reste non caché (fallback SPA).
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
