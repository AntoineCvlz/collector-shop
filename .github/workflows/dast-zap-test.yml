on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      LARAVEL_APP_KEY:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  dast-zap-test:
    name: 🧪 DAST ZAP Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull Docker image from Docker Hub
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}

      - name: Create Docker network
        run: docker network create app-network

      - name: Start PostgreSQL container
        run: |
          docker run -d --name postgres \
            --network app-network \
            -e POSTGRES_DB=laravel \
            -e POSTGRES_USER=user \
            -e POSTGRES_PASSWORD=password \
            postgres:18-alpine

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 30 sh -c 'until docker exec postgres pg_isready -U user -d laravel > /dev/null 2>&1; do sleep 2; done'

      - name: Run application container (php-fpm + nginx)
        run: |
          docker run -d --name test-app \
            --network app-network \
            -p 9000:9000 \
            -e APP_ENV=testing \
            -e APP_KEY=${{ secrets.LARAVEL_APP_KEY }} \
            -e APP_DEBUG=false \
            -e APP_URL=http://localhost:8080 \
            -e DB_CONNECTION=pgsql \
            -e DB_HOST=postgres \
            -e DB_PORT=5432 \
            -e DB_DATABASE=laravel \
            -e DB_USERNAME=user \
            -e DB_PASSWORD=password \
            -e SESSION_DRIVER=database \
            -e CACHE_STORE=database \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}

      - name: Start Nginx as reverse proxy
        run: |
          cat > /tmp/nginx.conf << 'EOF'
          server {
              listen 8080;
              root /var/www/html/public;
              index index.php;

              location / {
                  try_files $uri $uri/ /index.php?$query_string;
              }

              location ~ \.php$ {
                  fastcgi_pass test-app:9000;
                  fastcgi_index index.php;
                  fastcgi_param SCRIPT_FILENAME /var/www/html/public$fastcgi_script_name;
                  include fastcgi_params;
              }
          }
          EOF

          docker run -d --name nginx \
            --network app-network \
            -p 8080:8080 \
            -v /tmp/nginx.conf:/etc/nginx/conf.d/default.conf:ro \
            nginx:alpine

      - name: Run Laravel migrations
        run: |
          docker exec test-app php artisan migrate --force --no-interaction

      - name: Wait for application to be ready
        run: |
          timeout 90 sh -c 'until curl -sf http://localhost:8080/up; do sleep 2; done'

      - name: Create ZAP reports directory
        run: |
          mkdir -p ${{ github.workspace }}/zap-reports
          mkdir -p /tmp/zap-home
          chmod -R 777 ${{ github.workspace }}/zap-reports
          chmod -R 777 /tmp/zap-home

      - name: Run OWASP ZAP DAST scan
        run: |
          # -J JSON (parsé par le gate), -r HTML (humain), -I : le conteneur
          # n'échoue pas sur alerte → c'est le gate ci-dessous qui décide.
          docker run --rm \
            -v ${{ github.workspace }}/zap-reports:/zap/wrk/:rw \
            -v /tmp/zap-home:/home/zap:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8080 \
            -r zap-report.html \
            -J zap-report.json \
            -I
        continue-on-error: true

      # Garde-fou : si ZAP n'a pas produit de rapport, c'est que le scan n'a
      # pas réellement balayé l'app (app morte, réseau, crash) → on échoue.
      - name: Verify ZAP actually scanned the app
        run: |
          test -s "${{ github.workspace }}/zap-reports/zap-report.json" \
            || { echo "::error::ZAP n'a produit aucun rapport JSON — le scan DAST n'a pas eu lieu."; exit 1; }

      # Bloque sur les alertes HIGH (riskcode ZAP : 3=High). Medium/Low restent
      # visibles dans les rapports uploadés, non bloquantes.
      - name: 🚦 ZAP gate (blocking on HIGH risk alerts)
        run: |
          REPORT="${{ github.workspace }}/zap-reports/zap-report.json"
          # riskcode peut être string ou nombre selon la version → tonumber?.
          HIGH=$(jq '[.site[].alerts[] | select((.riskcode | tonumber?) == 3)] | length' "$REPORT")
          echo "Alertes ZAP de risque HIGH : ${HIGH}"
          if [ "${HIGH:-0}" -gt 0 ]; then
            echo "::error::DAST : ${HIGH} alerte(s) HIGH détectée(s) — voir l'artifact zap-scan-reports."
            jq -r '.site[].alerts[] | select((.riskcode | tonumber?) == 3) | "  - \(.alert) (\(.instances | length) instance(s))"' "$REPORT"
            exit 1
          fi
          echo "✓ Aucune alerte HIGH."

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: zap-scan-reports
          path: |
            zap-reports/zap-report.html
            zap-reports/zap-report.json

      - name: Stop test containers
        if: always()
        run: |
          docker stop test-app nginx postgres || true
          docker rm test-app nginx postgres || true
          docker network rm app-network || true
