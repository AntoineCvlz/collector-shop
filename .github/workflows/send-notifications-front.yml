on:
  workflow_call:
    secrets:
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_TO:
        required: true
    inputs:
      result_build_and_test_front:
        required: true
        type: string
      result_code_quality_sast_front:
        required: true
        type: string
      result_secret_scanning:
        required: true
        type: string
      result_sca_dependency_scan_front:
        required: true
        type: string
      result_secure_iac_dockerfile_scan_front:
        required: true
        type: string
      result_build_and_scan_docker_front:
        required: true
        type: string
      result_publish_docker_hub_front:
        required: true
        type: string
      result_dast_zap_test_front:
        required: true
        type: string

jobs:
  send-notifications-front:
    name: 📬 Send Frontend Notifications
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 📊 Check pipeline status
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 FRONTEND PIPELINE STATUS REPORT"
          echo "═══════════════════════════════════════"
          echo "Build & Test:    ${{ inputs.result_build_and_test_front }}"
          echo "SAST:            ${{ inputs.result_code_quality_sast_front }}"
          echo "Secret Scanning: ${{ inputs.result_secret_scanning }}"
          echo "SCA:             ${{ inputs.result_sca_dependency_scan_front }}"
          echo "IaC Security:    ${{ inputs.result_secure_iac_dockerfile_scan_front }}"
          echo "Docker Build:    ${{ inputs.result_build_and_scan_docker_front }}"
          echo "Docker Publish:  ${{ inputs.result_publish_docker_hub_front }}"
          echo "DAST ZAP:        ${{ inputs.result_dast_zap_test_front }}"
          echo "═══════════════════════════════════════"

      - name: 🎨 Determine overall status
        id: status
        run: |
          if [[ \
            "${{ inputs.result_build_and_test_front }}" == "success" && \
            "${{ inputs.result_code_quality_sast_front }}" == "success" && \
            "${{ inputs.result_secret_scanning }}" == "success" && \
            "${{ inputs.result_sca_dependency_scan_front }}" == "success" && \
            "${{ inputs.result_secure_iac_dockerfile_scan_front }}" == "success" && \
            "${{ inputs.result_build_and_scan_docker_front }}" == "success" && \
            "${{ inputs.result_publish_docker_hub_front }}" == "success" && \
            "${{ inputs.result_dast_zap_test_front }}" == "success" \
          ]]; then
            echo "overall=✅ SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "overall=❌ FAILURE" >> $GITHUB_OUTPUT
          fi

      - name: 📧 Send email notification
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          PIPELINE_STATUS: ${{ steps.status.outputs.overall }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_REF_NAME: ${{ github.ref_name }}
          GH_SHA: ${{ github.sha }}
          GH_ACTOR: ${{ github.actor }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_RUN_ID: ${{ github.run_id }}
          RESULT_BUILD: ${{ inputs.result_build_and_test_front }}
          RESULT_SAST: ${{ inputs.result_code_quality_sast_front }}
          RESULT_SECRETS: ${{ inputs.result_secret_scanning }}
          RESULT_SCA: ${{ inputs.result_sca_dependency_scan_front }}
          RESULT_IAC: ${{ inputs.result_secure_iac_dockerfile_scan_front }}
          RESULT_DOCKER: ${{ inputs.result_build_and_scan_docker_front }}
          RESULT_PUBLISH: ${{ inputs.result_publish_docker_hub_front }}
          RESULT_DAST: ${{ inputs.result_dast_zap_test_front }}
        run: |
          python3 << 'PYEOF'
          import smtplib, os
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText

          e = os.environ
          html = (
              "<h2>📊 Frontend Pipeline Status Report</h2>"
              f"<p><strong>Repository:</strong> {e['GH_REPOSITORY']}</p>"
              f"<p><strong>Branch:</strong> {e['GH_REF_NAME']}</p>"
              f"<p><strong>Commit:</strong> {e['GH_SHA']}</p>"
              f"<p><strong>Triggered by:</strong> {e['GH_ACTOR']}</p>"
              f"<p><strong>Overall status:</strong> {e['PIPELINE_STATUS']}</p>"
              "<hr/>"
              "<table border='1' cellpadding='8' cellspacing='0'>"
              "<tr><th>Job</th><th>Status</th></tr>"
              f"<tr><td>🏗️ Build &amp; Test</td><td>{e['RESULT_BUILD']}</td></tr>"
              f"<tr><td>🔍 SAST</td><td>{e['RESULT_SAST']}</td></tr>"
              f"<tr><td>🔐 Secret Scanning</td><td>{e['RESULT_SECRETS']}</td></tr>"
              f"<tr><td>📦 SCA</td><td>{e['RESULT_SCA']}</td></tr>"
              f"<tr><td>🏗️ IaC Security</td><td>{e['RESULT_IAC']}</td></tr>"
              f"<tr><td>🐳 Docker Build</td><td>{e['RESULT_DOCKER']}</td></tr>"
              f"<tr><td>📤 Docker Publish</td><td>{e['RESULT_PUBLISH']}</td></tr>"
              f"<tr><td>🧪 DAST ZAP</td><td>{e['RESULT_DAST']}</td></tr>"
              "</table><hr/>"
              f"<p><a href='{e['GH_SERVER_URL']}/{e['GH_REPOSITORY']}/actions/runs/{e['GH_RUN_ID']}'>🔗 View full pipeline run</a></p>"
          )

          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"[{e['PIPELINE_STATUS']}] Frontend Pipeline - {e['GH_REPOSITORY']} ({e['GH_REF_NAME']})"
          msg["From"] = f"GitHub Actions <{e['MAIL_USERNAME']}>"
          msg["To"] = e["MAIL_TO"]
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
              server.login(e["MAIL_USERNAME"], e["MAIL_PASSWORD"])
              server.sendmail(e["MAIL_USERNAME"], e["MAIL_TO"], msg.as_string())
          print("✅ Email sent successfully!")
          PYEOF
