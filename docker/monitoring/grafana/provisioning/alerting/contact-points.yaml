# Point de contact des alertes Grafana : email de l'admin.
# L'envoi SMTP est configuré via les variables GF_SMTP_* du conteneur Grafana
# (cf. docker-compose.monitoring.yaml), alimentées par le .env (secrets CI).
apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-admin
    receivers:
      - uid: email-admin
        type: email
        settings:
          # Destinataire fourni par le .env (GF_ALERT_EMAIL_TO). Grafana
          # interpole ${...} depuis l'environnement du conteneur.
          #
          # Fallback OBLIGATOIRE : Grafana 11 REFUSE de démarrer si un contact
          # point "email" a des addresses vides ("could not find addresses in
          # settings" → crash-loop → 502). Tant que GF_ALERT_EMAIL_TO n'est pas
          # renseigné (secret prod), on met une adresse placeholder pour que
          # Grafana démarre. L'alerting n'enverra rien d'utile tant que le SMTP
          # et le destinataire réels ne sont pas configurés.
          addresses: ${GF_ALERT_EMAIL_TO:-alerts@example.invalid}
          singleEmail: false
        disableResolveMessage: false

# Politique de notification : tout passe par le contact point email-admin.
policies:
  - orgId: 1
    receiver: email-admin
    group_by: ["grafana_folder", "alertname"]
    # Regroupe les alertes, limite le spam.
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
