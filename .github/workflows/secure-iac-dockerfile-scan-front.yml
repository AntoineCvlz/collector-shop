on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  secure-iac-dockerfile-scan-front:
    name: IaC Frontend Security - Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🏗️ Run Checkov
        uses: bridgecrewio/checkov-action@v12.2776.0
        with:
          directory: frontend/
          framework: dockerfile
          output_format: sarif
          output_file_path: checkov-front-report.sarif
          soft_fail: true

      - name: 📤 Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-front-report.sarif/results_sarif.sarif
          category: checkov-frontend-iac
