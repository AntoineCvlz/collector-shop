# ─────────────────────────────────────────────────────────────
# Déploiement PRODUCTION — VPS unique, back + front mutualisés.
#
# Le déploiement est piloté par docker/docker-compose.prod.yaml :
#   pull des images back+front depuis Docker Hub, puis migrations Laravel.
# Approbation manuelle via l'environnement GitHub "production"
# (Settings → Environments → production → Required reviewers).
# ─────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      backend_image:
        required: true
        type: string
      frontend_image:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production      # secrets SSH_* scopés ici + approbation manuelle

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # Copie le compose de prod + les confs nginx sur le VPS (idempotent).
      - name: 📦 Sync fichiers de déploiement → VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.prod.yaml,docker/nginx/default.conf,docker/nginx/edge.prod.conf,docker/proxy/docker-compose.proxy.yaml,docker/proxy/Caddyfile"
          target: "/opt/collector-shop"
          strip_components: 1

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/collector-shop
            export BACKEND_IMAGE='${{ inputs.backend_image }}'
            export FRONTEND_IMAGE='${{ inputs.frontend_image }}'
            # Les deux images sont taguées "latest" par les pipelines de publication.
            # On déploie "latest" pour éviter tout décalage de sha entre back et front
            # (le front n'est rebuildé que lorsque frontend/** change).
            export IMAGE_TAG='latest'

            # Réseau frontal partagé proxy ⇄ applis (idempotent).
            docker network inspect web >/dev/null 2>&1 || docker network create web

            # IMPORTANT : recréer l'appli AVANT de lancer Caddy.
            # L'ancien app_edge pouvait publier :80 sur l'hôte ; le recréer
            # avec la nouvelle conf (plus de port publié) LIBÈRE le port 80
            # pour que Caddy puisse le prendre.
            # Le .env (secrets prod) vit sur le VPS et n'est jamais committé.
            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            # Proxy Caddy frontal (SSL Let's Encrypt auto) : démarre / recharge
            # la conf. Partagé par toutes les applis du VPS. Le reload prend en
            # compte un Caddyfile modifié même si le conteneur tournait déjà.
            docker compose -f proxy/docker-compose.proxy.yaml up -d
            docker compose -f proxy/docker-compose.proxy.yaml exec -T caddy \
              caddy reload --config /etc/caddy/Caddyfile || true
            # Migrations Laravel (idempotentes, --force = non interactif en prod)
            docker compose -f docker-compose.prod.yaml exec -T backend php artisan migrate --force
            docker compose -f docker-compose.prod.yaml exec -T backend php artisan config:cache
            docker image prune -f

      - name: 🏥 Health check production
        run: |
          # 1ère émission du certificat Let's Encrypt = quelques secondes.
          sleep 20
          # PRODUCTION_URL doit valoir https://collector-shop.antoine-cuvilliez.fr
          curl --fail --retry 5 --retry-delay 5 "${{ vars.PRODUCTION_URL }}/up"
