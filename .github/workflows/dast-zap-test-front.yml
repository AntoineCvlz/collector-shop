on:
  workflow_call:
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true
      DEPLOY_APPLI_NAME_FRONT:
        required: true

permissions:
  contents: read

jobs:
  dast-zap-test-front:
    name: 🧪 DAST ZAP Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull frontend image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DEPLOY_APPLI_NAME_FRONT }}:${{ github.sha }}

      - name: Run frontend container
        run: |
          docker run -d --name test-frontend \
            -p 8081:80 \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DEPLOY_APPLI_NAME_FRONT }}:${{ github.sha }}

      - name: Wait for frontend to be ready
        run: |
          timeout 60 sh -c 'until curl -sf http://localhost:8081; do sleep 2; done'

      - name: Create ZAP reports directory
        run: |
          mkdir -p ${{ github.workspace }}/zap-front-reports
          mkdir -p /tmp/zap-home
          chmod -R 777 ${{ github.workspace }}/zap-front-reports
          chmod -R 777 /tmp/zap-home

      - name: Run OWASP ZAP DAST scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/zap-front-reports:/zap/wrk/:rw \
            -v /tmp/zap-home:/home/zap:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:8081 \
            -r zap-front-report.html \
            -I
        continue-on-error: true

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-front-scan-reports
          path: zap-front-reports/zap-front-report.html

      - name: Stop test container
        if: always()
        run: |
          docker stop test-frontend || true
          docker rm test-frontend || true
