on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  id-token: write
  contents: read

jobs:
  publish-docker-hub:
    name: 📤 Publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # L'image est déjà poussée par build-and-scan-docker. Ce job ne fait que
      # la provenance (Cosign + SBOM) ; login requis pour la signature.
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🔏 Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: 🔏 Sign Docker image (keyless)
        run: |
          cosign sign --yes \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}

      # SBOM sur le tag immuable :sha (comme la signature Cosign ci-dessus).
      # Générer depuis :latest exposait à une course : :latest peut déjà pointer
      # sur une autre image que celle qu'on vient de signer → provenance faussée.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: sbom
          path: sbom.spdx.json
