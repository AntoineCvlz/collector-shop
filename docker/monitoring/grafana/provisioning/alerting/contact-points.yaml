apiVersion: 1

contactPoints:
  - orgId: 1
    name: email-admin
    receivers:
      - uid: email-admin
        type: email
        settings:
          addresses: $__env{GF_ALERT_EMAIL_TO}
          singleEmail: false
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: email-admin
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
