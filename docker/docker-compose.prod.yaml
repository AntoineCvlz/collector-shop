# ─────────────────────────────────────────────────────────────
# Production — VPS unique (1 environnement : production)
#
# Diffère du docker-compose.yaml de dev :
#   - on PULL les images depuis Docker Hub (publiées par la CI) au lieu de builder
#   - pas de volumes de code monté (images immuables)
#   - frontend buildé statique (pas le mode Vite dev)
#   - nginx-edge en frontal = point d'entrée unique sur le port 80
#
# Variables attendues dans /opt/collector-shop/.env (cf. .env.prod.example) :
#   DOCKERHUB_USERNAME, BACKEND_IMAGE, FRONTEND_IMAGE, IMAGE_TAG,
#   DB_DATABASE, DB_USERNAME, DB_PASSWORD,
#   APP_KEY, APP_URL, et toute autre variable Laravel.
# ─────────────────────────────────────────────────────────────

services:
  # --- BACKEND (Laravel / PHP 8.4 FPM) ---
  backend:
    image: ${DOCKERHUB_USERNAME}/${BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_backend
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy

  # --- NGINX du backend (sert PHP-FPM, comme en dev) ---
  nginx:
    image: nginx:alpine
    container_name: app_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - backend

  # --- FRONTEND (React/Vite buildé, servi par son nginx interne :8080) ---
  frontend:
    image: ${DOCKERHUB_USERNAME}/${FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: app_frontend
    restart: unless-stopped
    networks:
      - app-network

  # --- NGINX EDGE (point d'entrée unique, port 80) ---
  edge:
    image: nginx:alpine
    container_name: app_edge
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/edge.prod.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - nginx

  # --- DATABASE (PostgreSQL) ---
  db:
    image: postgres:18-alpine
    container_name: app_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-laravel}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD requis}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_DATABASE:-laravel}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
    driver: local
