on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  sca-dependency-scan-front:
    name: SCA Frontend - Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 NPM Audit — bloquant sur HIGH/CRITICAL
        run: npm audit --audit-level=high

      # Install Trivy via le script officiel (pas l'action, qui échoue au download).
      - name: 📥 Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.65.0
          trivy --version

      # Run 1 : rapport complet → onglet Security, non bloquant
      - name: 🔍 Trivy SCA — rapport SARIF
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-front-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0

      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('frontend/trivy-front-results.sarif') != ''
        with:
          sarif_file: frontend/trivy-front-results.sarif
          category: trivy-frontend-sca

      # Run 2 : gate bloquant sur CRITICAL/HIGH corrigeables
      - name: 🚦 Trivy SCA — gate (CRITICAL/HIGH bloquant)
        run: |
          trivy fs . \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1
