on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  code-quality-sast-front:
    name: 🔍 Frontend Security & Quality Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci


      - name: 🔍 Run Semgrep SAST
        if: always()
        run: |
          pip install semgrep --break-system-packages
          semgrep scan --config="p/typescript" --config="p/react" --config="p/security-audit" --config="p/secrets" --sarif --output=semgrep-front.sarif || true
          test -f semgrep-front.sarif || echo '{"version":"2.1.0","runs":[]}' > semgrep-front.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: 📤 Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: frontend/semgrep-front.sarif
          category: semgrep-front

      - name: 📦 Check JS Dependencies Security
        run: npm audit --audit-level=high