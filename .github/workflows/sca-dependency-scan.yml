on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  sca-dependency-scan:
    name: SCA - Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      # ═══════════════════════════════════════
      # 1. COMPOSER AUDIT (Le remplaçant natif de l'OWASP pour PHP)
      # ═══════════════════════════════════════
      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: 📦 Composer Audit (Native Laravel SCA) — bloquant
        run: composer audit --locked --format=plain

      # ═══════════════════════════════════════
      # 2. TRIVY SCA (Analyse des fichiers lock)
      # Install via le script officiel (pas l'action, qui échoue au download).
      # ═══════════════════════════════════════
      # Download direct du binaire (CDN GitHub, sans API → pas de rate-limit).
      - name: 📥 Install Trivy CLI
        run: |
          TRIVY_VERSION=0.71.0
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version

      # Run 1 : rapport complet (CRITICAL/HIGH/MEDIUM) → onglet Security, non bloquant
      - name: 🔍 Trivy SCA — rapport SARIF
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0

      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('backend/trivy-results.sarif') != ''
        with:
          sarif_file: backend/trivy-results.sarif
          category: trivy-sca

      # Run 2 : gate bloquant sur CRITICAL/HIGH corrigeables
      - name: 🚦 Trivy SCA — gate (CRITICAL/HIGH bloquant)
        run: |
          trivy fs . \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1