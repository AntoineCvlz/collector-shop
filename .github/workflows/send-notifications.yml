on:
  workflow_call:
    secrets:
      MAIL_USERNAME:
        required: true
      MAIL_PASSWORD:
        required: true
      MAIL_TO:
        required: true
    inputs:
      result_build_and_test:
        required: true
        type: string
      result_code_quality_sast:
        required: true
        type: string
      result_secret_scanning:
        required: true
        type: string
      result_sca_dependency_scan:
        required: true
        type: string
      result_secure_iac_dockerfile_scan:
        required: true
        type: string
      result_phpstan:
        required: false
        type: string
        default: skipped
      result_mutation_tests:
        required: false
        type: string
        default: skipped
      result_build_and_scan_docker:
        required: true
        type: string
      result_publish_docker_hub:
        required: true
        type: string
      result_dast_zap_test:
        required: true
        type: string
      # ─── Voie FRONT (optionnelle : 'skipped' si non fournie) ───
      result_build_and_test_front:
        required: false
        type: string
        default: skipped
      result_code_quality_sast_front:
        required: false
        type: string
        default: skipped
      result_sca_dependency_scan_front:
        required: false
        type: string
        default: skipped
      result_secure_iac_dockerfile_scan_front:
        required: false
        type: string
        default: skipped
      result_codeql_front:
        required: false
        type: string
        default: skipped
      result_e2e_playwright_front:
        required: false
        type: string
        default: skipped
      result_lighthouse_ci_front:
        required: false
        type: string
        default: skipped
      result_build_and_scan_docker_front:
        required: false
        type: string
        default: skipped
      result_publish_docker_hub_front:
        required: false
        type: string
        default: skipped
      result_dast_zap_test_front:
        required: false
        type: string
        default: skipped

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-notifications:
    name: 📬 Send Notifications
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: always()
    steps:
      - name: 📊 Check pipeline status
        run: |
          echo "═══════════════════════════════════════"
          echo "📊 PIPELINE STATUS REPORT"
          echo "═══════════════════════════════════════"
          echo "Build & Test:    ${{ inputs.result_build_and_test }}"
          echo "SAST:            ${{ inputs.result_code_quality_sast }}"
          echo "Secret Scanning: ${{ inputs.result_secret_scanning }}"
          echo "SCA:             ${{ inputs.result_sca_dependency_scan }}"
          echo "IaC Security:    ${{ inputs.result_secure_iac_dockerfile_scan }}"
          echo "PHPStan:         ${{ inputs.result_phpstan }}"
          echo "Mutation Tests:  ${{ inputs.result_mutation_tests }}"
          echo "Docker Build:    ${{ inputs.result_build_and_scan_docker }}"
          echo "Docker Publish:  ${{ inputs.result_publish_docker_hub }}"
          echo "DAST ZAP:        ${{ inputs.result_dast_zap_test }}"
          echo "─────────── FRONT ───────────"
          echo "Build & Test:    ${{ inputs.result_build_and_test_front }}"
          echo "SAST:            ${{ inputs.result_code_quality_sast_front }}"
          echo "SCA:             ${{ inputs.result_sca_dependency_scan_front }}"
          echo "IaC Security:    ${{ inputs.result_secure_iac_dockerfile_scan_front }}"
          echo "CodeQL:          ${{ inputs.result_codeql_front }}"
          echo "E2E Playwright:  ${{ inputs.result_e2e_playwright_front }}"
          echo "Lighthouse:      ${{ inputs.result_lighthouse_ci_front }}"
          echo "Docker Build:    ${{ inputs.result_build_and_scan_docker_front }}"
          echo "Docker Publish:  ${{ inputs.result_publish_docker_hub_front }}"
          echo "DAST ZAP:        ${{ inputs.result_dast_zap_test_front }}"
          echo "═══════════════════════════════════════"

      - name: 🎨 Determine overall status
        id: status
        env:
          RESULTS: >-
            ${{ inputs.result_build_and_test }}
            ${{ inputs.result_code_quality_sast }}
            ${{ inputs.result_secret_scanning }}
            ${{ inputs.result_sca_dependency_scan }}
            ${{ inputs.result_secure_iac_dockerfile_scan }}
            ${{ inputs.result_phpstan }}
            ${{ inputs.result_mutation_tests }}
            ${{ inputs.result_build_and_scan_docker }}
            ${{ inputs.result_publish_docker_hub }}
            ${{ inputs.result_dast_zap_test }}
            ${{ inputs.result_build_and_test_front }}
            ${{ inputs.result_code_quality_sast_front }}
            ${{ inputs.result_sca_dependency_scan_front }}
            ${{ inputs.result_secure_iac_dockerfile_scan_front }}
            ${{ inputs.result_codeql_front }}
            ${{ inputs.result_e2e_playwright_front }}
            ${{ inputs.result_lighthouse_ci_front }}
            ${{ inputs.result_build_and_scan_docker_front }}
            ${{ inputs.result_publish_docker_hub_front }}
            ${{ inputs.result_dast_zap_test_front }}
        run: |
          # Un job 'skipped' (ex. non lancé en PR) n'est PAS un échec.
          # Seuls 'failure' et 'cancelled' déclenchent un statut global rouge.
          overall="✅ SUCCESS"
          color="green"
          for r in $RESULTS; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              overall="❌ FAILURE"
              color="red"
              break
            fi
          done
          echo "overall=$overall" >> "$GITHUB_OUTPUT"
          echo "color=$color" >> "$GITHUB_OUTPUT"

      - name: 📧 Send email notification
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: GitHub Actions <${{ secrets.MAIL_USERNAME }}>
          subject: "[${{ steps.status.outputs.overall }}] Pipeline - ${{ github.repository }} (${{ github.ref_name }})"
          html_body: |
            <h2>📊 Pipeline Status Report</h2>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Branch:</strong> ${{ github.ref_name }}</p>
            <p><strong>Commit:</strong> ${{ github.sha }}</p>
            <p><strong>Triggered by:</strong> ${{ github.actor }}</p>
            <p><strong>Overall status:</strong> ${{ steps.status.outputs.overall }}</p>
            <hr/>
            <table border="1" cellpadding="8" cellspacing="0">
              <tr><th>Job</th><th>Status</th></tr>
              <tr><th colspan="2" style="background:#eef;">⚙️ BACKEND</th></tr>
              <tr><td>🏗️ Build & Test</td><td>${{ inputs.result_build_and_test }}</td></tr>
              <tr><td>🔍 SAST</td><td>${{ inputs.result_code_quality_sast }}</td></tr>
              <tr><td>🔐 Secret Scanning</td><td>${{ inputs.result_secret_scanning }}</td></tr>
              <tr><td>📦 SCA</td><td>${{ inputs.result_sca_dependency_scan }}</td></tr>
              <tr><td>🏗️ IaC Security</td><td>${{ inputs.result_secure_iac_dockerfile_scan }}</td></tr>
              <tr><td>🔍 PHPStan</td><td>${{ inputs.result_phpstan }}</td></tr>
              <tr><td>🧬 Mutation Tests</td><td>${{ inputs.result_mutation_tests }}</td></tr>
              <tr><td>🐳 Docker Build</td><td>${{ inputs.result_build_and_scan_docker }}</td></tr>
              <tr><td>📤 Docker Publish</td><td>${{ inputs.result_publish_docker_hub }}</td></tr>
              <tr><td>🧪 DAST ZAP</td><td>${{ inputs.result_dast_zap_test }}</td></tr>
              <tr><th colspan="2" style="background:#efe;">🎨 FRONTEND</th></tr>
              <tr><td>🏗️ Build & Test</td><td>${{ inputs.result_build_and_test_front }}</td></tr>
              <tr><td>🔍 SAST</td><td>${{ inputs.result_code_quality_sast_front }}</td></tr>
              <tr><td>📦 SCA</td><td>${{ inputs.result_sca_dependency_scan_front }}</td></tr>
              <tr><td>🏗️ IaC Security</td><td>${{ inputs.result_secure_iac_dockerfile_scan_front }}</td></tr>
              <tr><td>🔍 CodeQL</td><td>${{ inputs.result_codeql_front }}</td></tr>
              <tr><td>🎭 E2E Playwright</td><td>${{ inputs.result_e2e_playwright_front }}</td></tr>
              <tr><td>💡 Lighthouse</td><td>${{ inputs.result_lighthouse_ci_front }}</td></tr>
              <tr><td>🐳 Docker Build</td><td>${{ inputs.result_build_and_scan_docker_front }}</td></tr>
              <tr><td>📤 Docker Publish</td><td>${{ inputs.result_publish_docker_hub_front }}</td></tr>
              <tr><td>🧪 DAST ZAP</td><td>${{ inputs.result_dast_zap_test_front }}</td></tr>
            </table>
            <hr/>
            <p><a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">🔗 View full pipeline run</a></p>
