server {
    listen 80;
    index index.php index.html;
    root /var/www/html/public;

    # Ne pas divulguer la version de nginx (Server: nginx/x.y.z → Server: nginx).
    server_tokens off;

    # Supprime l'en-tête X-Powered-By émis par PHP-FPM (défense en profondeur,
    # en complément de expose_php = Off côté php.ini).
    fastcgi_hide_header X-Powered-By;

    # En-têtes de sécurité (réponses API JSON, pas de rendu HTML/JS ici).
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}