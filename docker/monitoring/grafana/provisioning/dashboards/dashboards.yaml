# Charge automatiquement les dashboards JSON déposés dans /var/lib/grafana/dashboards.
apiVersion: 1

providers:
  - name: default
    orgId: 1
    folder: Infra
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
