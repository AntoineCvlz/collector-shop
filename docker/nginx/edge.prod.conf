# ─────────────────────────────────────────────────────────────
# nginx-edge — point d'entrée unique en production (port 80)
#
#   /                  → conteneur frontend (Vite/React buildé, sert sur :8080)
#   /api, /up, /sanctum, /storage → backend Laravel (PHP-FPM via son nginx :80)
#
# Front et back partagés sur la même origine → aucune config CORS nécessaire.
# ─────────────────────────────────────────────────────────────

upstream frontend_upstream {
    server frontend:8080;
}

# Le service backend est servi par son propre nginx (cf. docker-compose : service "nginx")
upstream backend_upstream {
    server nginx:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;  # uploads d'images d'articles

    # En-têtes de sécurité communs à toutes les réponses de l'edge.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ---- API & endpoints Laravel → backend ----
    location /api {
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; form-action 'none'" always;
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /up {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sanctum {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Tout le reste → frontend (SPA) ----
    location / {
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.bunny.net 'unsafe-inline'; font-src 'self' https://fonts.bunny.net; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'" always;
        proxy_pass http://frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
