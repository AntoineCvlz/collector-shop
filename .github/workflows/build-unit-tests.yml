on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    name: Build & PHPUnit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: laravel_test
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, pgsql, pdo_pgsql, zip, bcmath
          coverage: xdebug
          tools: composer:v2

      - name: 📦 Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: backend/vendor
          key: composer-${{ runner.os }}-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: 📦 Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: 📦 Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('backend/package-lock.json', 'backend/package.json') }}
          restore-keys: npm-${{ runner.os }}-

      - name: ⚡ Install NPM dependencies & Build assets
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "::warning::Pas de package-lock.json committé — build non reproductible (npm install)."
            npm install
          fi
          npm run build

      - name: ⚙️ Prepare Laravel Environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🗄️ Run migrations
        run: php artisan migrate --force --no-interaction
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🔑 Generate Passport keys
        run: php artisan passport:keys --force --no-interaction

      - name: 🧪 Run tests
        run: php artisan test --coverage-clover coverage.xml
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: laravel_test
          DB_USERNAME: laravel
          DB_PASSWORD: secret

      - name: 🚦 Coverage gate
        env:
          COVERAGE_MIN: ${{ vars.COVERAGE_MIN || '80' }}
        run: |
          php -r '
          $min = (float) getenv("COVERAGE_MIN");
          $xml = simplexml_load_file("coverage.xml");
          $metrics = $xml->project->metrics;
          $covered = (int) $metrics["coveredstatements"];
          $total = (int) $metrics["statements"];
          $pct = $total > 0 ? round(($covered / $total) * 100, 2) : 0;
          echo "Coverage: {$pct}% (gate minimum: {$min}%)" . PHP_EOL;
          if ($pct < $min) {
              fwrite(STDERR, "::error::Coverage gate failed: {$pct}% < {$min}%" . PHP_EOL);
              exit(1);
          }
          echo "Coverage gate passed." . PHP_EOL;
          '

      - name: 📊 Upload coverage report
        if: always() && hashFiles('backend/coverage.xml') != ''
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7
