on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

jobs:
  code-quality-sast-front:
    name: 🔍 Frontend Security & Quality Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      # ═══════════════════════════════════════
      # 1. ESLINT (Qualité de code)
      # ═══════════════════════════════════════
      - name: 🎨 Run ESLint
        run: npm run lint
        continue-on-error: true

      # ═══════════════════════════════════════
      # 2. TYPESCRIPT CHECK
      # ═══════════════════════════════════════
      - name: 🔷 TypeScript Check
        run: npx tsc --noEmit
        continue-on-error: true

      # ═══════════════════════════════════════
      # 3. SEMGREP
      # ═══════════════════════════════════════
      - name: 🔍 Run Semgrep SAST
        run: |
          pip install semgrep --break-system-packages
          semgrep scan --config="p/typescript" --config="p/react" --config="p/security-audit" --config="p/secrets" --sarif --output=../semgrep-front.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: 📤 Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-front.sarif
          category: semgrep-front

      # ═══════════════════════════════════════
      # 4. NPM AUDIT (Sécurité Dépendances)
      # ═══════════════════════════════════════
      - name: 📦 Check JS Dependencies Security
        run: npm audit --audit-level=high
        continue-on-error: true