# ─────────────────────────────────────────────────────────────
# Déploiement PRODUCTION — VPS unique, back + front mutualisés.
#
# Le déploiement est piloté par docker/docker-compose.prod.yaml :
#   pull des images back+front depuis Docker Hub, puis migrations Laravel.
# Approbation manuelle via l'environnement GitHub "production"
# (Settings → Environments → production → Required reviewers).
# ─────────────────────────────────────────────────────────────
on:
  workflow_call:
    inputs:
      backend_image:
        required: true
        type: string
      frontend_image:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production      # secrets SSH_* scopés ici + approbation manuelle

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      # Copie le compose de prod + les confs nginx sur le VPS (idempotent).
      - name: 📦 Sync fichiers de déploiement → VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.prod.yaml,docker/nginx/default.conf,docker/nginx/edge.prod.conf,docker/proxy/docker-compose.proxy.yaml,docker/proxy/Caddyfile,docker/monitoring/docker-compose.monitoring.yaml,docker/monitoring/.env.monitoring.example,docker/monitoring/prometheus/prometheus.yml,docker/monitoring/grafana/provisioning/datasources/prometheus.yaml,docker/monitoring/grafana/provisioning/dashboards/dashboards.yaml,docker/monitoring/grafana/provisioning/alerting/contact-points.yaml,docker/monitoring/grafana/provisioning/alerting/rules.yaml,docker/monitoring/grafana/dashboards/node-exporter-full.json,docker/monitoring/grafana/dashboards/cadvisor.json,docker/monitoring/grafana/dashboards/laravel-app.json,docker/monitoring/grafana/dashboards/postgres.json"
          target: "/opt/collector-shop"
          strip_components: 1

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/collector-shop
            export BACKEND_IMAGE='${{ inputs.backend_image }}'
            export FRONTEND_IMAGE='${{ inputs.frontend_image }}'
            # Les deux images sont taguées "latest" par les pipelines de publication.
            # On déploie "latest" pour éviter tout décalage de sha entre back et front
            # (le front n'est rebuildé que lorsque frontend/** change).
            export IMAGE_TAG='latest'

            # Réseaux Docker partagés (idempotents), créés AVANT tout compose :
            #  - web        : proxy Caddy ⇄ applis
            #  - monitoring : Prometheus ⇄ cibles ; l'app y rejoint son nginx
            #                 pour exposer /metrics en interne. Déclaré "external"
            #                 dans les deux composes → doit préexister.
            docker network inspect web >/dev/null 2>&1 || docker network create web
            docker network inspect monitoring >/dev/null 2>&1 || docker network create monitoring

            # ROLLBACK : mémoriser l'image backend ACTUELLEMENT en service avant
            # de pull la nouvelle. On la re-taguera si les smoke tests échouent.
            # (chaîne vide au tout premier déploiement → pas de rollback possible).
            PREV_BACKEND_IMAGE="$(docker inspect --format '{{.Image}}' app_backend 2>/dev/null || true)"
            echo "Image backend précédente : ${PREV_BACKEND_IMAGE:-<aucune>}"

            # IMPORTANT : recréer l'appli AVANT de lancer Caddy.
            # L'ancien app_edge pouvait publier :80 sur l'hôte ; le recréer
            # avec la nouvelle conf (plus de port publié) LIBÈRE le port 80
            # pour que Caddy puisse le prendre.
            # Le .env (secrets prod) vit sur le VPS et n'est jamais committé.
            docker compose -f docker-compose.prod.yaml pull
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans

            # Proxy Caddy frontal (SSL Let's Encrypt auto). Partagé par toutes
            # les applis du VPS. Les certificats vivent dans le volume /data,
            # donc recréer le conteneur ne les perd pas et ne re-sollicite pas
            # Let's Encrypt inutilement.
            #
            # --force-recreate est REQUIS ici : le SCP REMPLACE le Caddyfile
            # (nouvel inode), or le bind-mount du conteneur reste accroché à
            # l'ANCIEN inode → un simple `caddy reload` relit l'ancien contenu
            # ("config is unchanged") et ignore tout nouveau bloc (ex. grafana).
            # Recréer le conteneur ré-attache le bind au fichier courant.
            docker compose -f proxy/docker-compose.proxy.yaml up -d --force-recreate

            # Stack d'observabilité (Prometheus + Grafana + exporters infra/pg/app).
            # Découplée de l'app mais déployée dans le même flux, à chaque merge.
            # Le .env (secrets Grafana + connexion PG de l'exporter) est généré
            # ICI depuis les secrets GitHub de l'environnement "production" :
            # il n'est jamais committé et reste sur le VPS.
            #
            # Écriture ATOMIQUE et TOLÉRANTE : on écrit un fichier temporaire en
            # 600 puis on le déplace en place. `rm -f` d'abord car un ancien
            # monitoring/.env appartenant à root (déploiements antérieurs) ferait
            # échouer une redirection `>` en tant qu'utilisateur deploy.
            umask 077
            rm -f monitoring/.env
            install -m 600 /dev/null monitoring/.env.tmp
            cat > monitoring/.env.tmp <<ENV
            GF_SECURITY_ADMIN_USER=${{ secrets.GF_SECURITY_ADMIN_USER }}
            GF_SECURITY_ADMIN_PASSWORD=${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
            DATA_SOURCE_NAME=${{ secrets.MONITORING_DATA_SOURCE_NAME }}
            GF_SMTP_ENABLED=${{ vars.GF_SMTP_ENABLED || 'false' }}
            GF_SMTP_HOST=${{ secrets.GF_SMTP_HOST }}
            GF_SMTP_USER=${{ secrets.GF_SMTP_USER }}
            GF_SMTP_PASSWORD=${{ secrets.GF_SMTP_PASSWORD }}
            GF_SMTP_FROM_ADDRESS=${{ secrets.GF_SMTP_FROM_ADDRESS }}
            GF_ALERT_EMAIL_TO=${{ secrets.GF_ALERT_EMAIL_TO }}
            ENV
            mv -f monitoring/.env.tmp monitoring/.env
            docker compose -f monitoring/docker-compose.monitoring.yaml pull
            docker compose -f monitoring/docker-compose.monitoring.yaml up -d --remove-orphans

            # Migrations Laravel (idempotentes, --force = non interactif en prod)
            docker compose -f docker-compose.prod.yaml exec -T backend php artisan migrate --force
            docker compose -f docker-compose.prod.yaml exec -T backend php artisan config:cache

            # ─── SMOKE TESTS (endpoints critiques, en INTERNE via app_edge) ───
            # On teste la vraie stack déployée avant de la valider. Test interne
            # (app_edge:80) pour ne pas dépendre de la propagation TLS/DNS.
            #
            # Attente active : app_edge/app_backend viennent d'être recréés,
            # nginx + php-fpm mettent quelques secondes à écouter → on RÉESSAIE
            # au lieu d'un sleep fixe (qui donnait "Connection refused").
            probe() {
              # $1 = chemin ; réessaie jusqu'à ~60s.
              local path="$1" i
              for i in $(seq 1 20); do
                if docker exec app_edge wget -qO- --timeout=5 "http://localhost${path}" >/dev/null 2>&1; then
                  return 0
                fi
                sleep 3
              done
              return 1
            }
            smoke_test() {
              echo "▶ Smoke tests…"
              probe /up             || { echo "✗ /up KO";             return 1; }
              probe /api/articles   || { echo "✗ /api/articles KO";   return 1; }
              probe /api/categories || { echo "✗ /api/categories KO"; return 1; }
              echo "✓ Smoke tests OK"
            }

            # ─── ROLLBACK auto si les smoke tests échouent ───
            if ! smoke_test; then
              echo "❌ Smoke tests en échec."
              # Nom d'image EXACT attendu par le compose : ${DOCKERHUB_USERNAME}/
              # ${BACKEND_IMAGE}:latest. DOCKERHUB_USERNAME vit dans le .env prod
              # (lu par compose), pas dans ce shell → on le récupère depuis là.
              DHU="$(grep -E '^DOCKERHUB_USERNAME=' .env | cut -d= -f2- || true)"
              TARGET_TAG="${DHU}/${BACKEND_IMAGE}:latest"
              if [ -n "$PREV_BACKEND_IMAGE" ] && [ -n "$DHU" ]; then
                echo "↩ Rollback : re-déploiement de l'image backend précédente ($TARGET_TAG)."
                # On re-tague l'ancienne image sous le tag "latest" : le
                # up --force-recreate réutilise cette image LOCALE (Compose ne
                # pull que si l'image est absente), donc pas besoin d'un flag
                # --no-pull/--pull (non portable selon la version de Compose).
                docker tag "$PREV_BACKEND_IMAGE" "$TARGET_TAG"
                docker compose -f docker-compose.prod.yaml up -d --force-recreate backend nginx edge
                if probe /up; then
                  echo "↩ Rollback appliqué (ancienne version de nouveau en service)."
                else
                  echo "⚠ Rollback tenté mais /up ne répond toujours pas."
                fi
              else
                echo "⚠ Rollback impossible (pas d'image précédente ou DOCKERHUB_USERNAME introuvable)."
              fi
              docker image prune -f
              exit 1
            fi

            docker image prune -f

      - name: 🏥 Health check production
        run: |
          # 1ère émission du certificat Let's Encrypt = quelques secondes.
          sleep 20
          # PRODUCTION_URL doit valoir https://collector-shop.antoine-cuvilliez.fr
          curl --fail --retry 5 --retry-delay 5 "${{ vars.PRODUCTION_URL }}/up"
