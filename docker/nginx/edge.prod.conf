
upstream frontend_upstream {
    server frontend:8080;
}

upstream backend_upstream {
    server nginx:80;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /api {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; form-action 'none'" always;
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /up {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sanctum {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /storage {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include /etc/nginx/snippets/security-headers.conf;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.bunny.net 'unsafe-inline'; font-src 'self' https://fonts.bunny.net; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; form-action 'self'" always;
        proxy_pass http://frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
