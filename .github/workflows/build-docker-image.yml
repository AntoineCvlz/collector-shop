on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: "Docker image name (without DockerHub username prefix)"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  build-and-scan-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy CLI
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sudo sh -s -- -b /usr/local/bin v0.65.0
          trivy --version

      - name: Run Trivy scan for GitHub Security (SARIF, non bloquant)
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy-container-scan

      - name: 🚦 Trivy gate (blocking on CRITICAL/HIGH)
        run: |
          trivy image \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 1 \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Save Docker image as archive
        run: docker save ${{ inputs.app_name }}:${{ github.sha }} | gzip > docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v6
        with:
          name: docker-image-${{ inputs.app_name }}-${{ github.sha }}
          path: docker-image.tar.gz
          retention-days: 1
