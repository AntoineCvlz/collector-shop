on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read

jobs:
  sca-dependency-scan-front:
    name: SCA Frontend - Dependency Security
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔐 NPM Audit — bloquant sur HIGH/CRITICAL
        run: npm audit --audit-level=high

      - name: 📥 Install Trivy CLI
        run: |
          TRIVY_VERSION=0.71.0
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version

      - name: 🔍 Trivy SCA — rapport SARIF
        run: |
          trivy fs . \
            --format sarif \
            --output trivy-front-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed \
            --exit-code 0

      - name: 📤 Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('frontend/trivy-front-results.sarif') != ''
        with:
          sarif_file: frontend/trivy-front-results.sarif
          category: trivy-frontend-sca

      - name: 🚦 Trivy SCA — gate (CRITICAL/HIGH bloquant)
        run: |
          trivy fs . \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1
