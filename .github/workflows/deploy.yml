on:
  workflow_call:
    inputs:
      backend_image:
        required: true
        type: string
      frontend_image:
        required: true
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true

jobs:
  deploy-production:
    name: 🚀 Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6

      - name: 📦 Sync fichiers de déploiement → VPS
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker/docker-compose.prod.yaml,docker/nginx/default.conf,docker/nginx/edge.prod.conf,docker/nginx/security-headers.conf,docker/proxy/docker-compose.proxy.yaml,docker/proxy/Caddyfile,docker/monitoring/docker-compose.monitoring.yaml,docker/monitoring/.env.monitoring.example,docker/monitoring/prometheus/prometheus.yml,docker/monitoring/grafana/provisioning/datasources/prometheus.yaml,docker/monitoring/grafana/provisioning/dashboards/dashboards.yaml,docker/monitoring/grafana/provisioning/alerting/contact-points.yaml,docker/monitoring/grafana/provisioning/alerting/rules.yaml,docker/monitoring/grafana/dashboards/node-exporter-full.json,docker/monitoring/grafana/dashboards/cadvisor.json,docker/monitoring/grafana/dashboards/laravel-app.json,docker/monitoring/grafana/dashboards/postgres.json"
          target: "/opt/collector-shop"
          strip_components: 1

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          LARAVEL_APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_URL: ${{ vars.PRODUCTION_URL }}
          PASSPORT_PRIVATE_KEY: ${{ secrets.PASSPORT_PRIVATE_KEY }}
          PASSPORT_PUBLIC_KEY: ${{ secrets.PASSPORT_PUBLIC_KEY }}
          GF_SECURITY_ADMIN_USER: ${{ secrets.GF_SECURITY_ADMIN_USER }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          MONITORING_DATA_SOURCE_NAME: ${{ secrets.MONITORING_DATA_SOURCE_NAME }}
          GF_ALERT_EMAIL_TO: ${{ secrets.GF_ALERT_EMAIL_TO || 'alerts@example.invalid' }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOCKERHUB_USERNAME,LARAVEL_APP_KEY,DB_PASSWORD,APP_URL,PASSPORT_PRIVATE_KEY,PASSPORT_PUBLIC_KEY,GF_SECURITY_ADMIN_USER,GF_SECURITY_ADMIN_PASSWORD,MONITORING_DATA_SOURCE_NAME,GF_ALERT_EMAIL_TO
          script: |
            set -e
            cd /opt/collector-shop
            export BACKEND_IMAGE='${{ inputs.backend_image }}'
            export FRONTEND_IMAGE='${{ inputs.frontend_image }}'
            export IMAGE_TAG='latest'

            docker network inspect web >/dev/null 2>&1 || docker network create web
            docker network inspect monitoring >/dev/null 2>&1 || docker network create monitoring

            PREV_BACKEND_IMAGE="$(docker inspect --format '{{.Image}}' app_backend 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(docker inspect --format '{{.Image}}' app_frontend 2>/dev/null || true)"
            echo "Image backend précédente  : ${PREV_BACKEND_IMAGE:-<aucune>}"
            echo "Image frontend précédente : ${PREV_FRONTEND_IMAGE:-<aucune>}"

            umask 077
            rm -f .env
            install -m 600 /dev/null .env.tmp
            cat > .env.tmp <<ENV
            DOCKERHUB_USERNAME=${DOCKERHUB_USERNAME}
            BACKEND_IMAGE=${BACKEND_IMAGE}
            FRONTEND_IMAGE=${FRONTEND_IMAGE}
            IMAGE_TAG=${IMAGE_TAG}
            APP_PORT=80
            APP_NAME=CollectorShop
            APP_ENV=production
            APP_DEBUG=false
            APP_KEY=${LARAVEL_APP_KEY}
            APP_URL=${APP_URL}
            APP_LOCALE=fr
            APP_FALLBACK_LOCALE=en
            DB_CONNECTION=pgsql
            DB_HOST=db
            DB_PORT=5432
            DB_DATABASE=collector_shop
            DB_USERNAME=collector
            DB_PASSWORD=${DB_PASSWORD}
            SESSION_DRIVER=database
            SESSION_LIFETIME=120
            CACHE_STORE=database
            QUEUE_CONNECTION=database
            LOG_CHANNEL=stderr
            LOG_LEVEL=warning
            PASSPORT_PRIVATE_KEY="${PASSPORT_PRIVATE_KEY}"
            PASSPORT_PUBLIC_KEY="${PASSPORT_PUBLIC_KEY}"
            ENV
            mv -f .env.tmp .env

            docker compose -f docker-compose.prod.yaml pull

            echo "▶ [1/2] Déploiement back (db, backend, nginx, edge)…"
            docker compose -f docker-compose.prod.yaml up -d db backend nginx edge

            docker compose -f proxy/docker-compose.proxy.yaml up -d --force-recreate

            umask 077
            rm -f monitoring/.env
            install -m 600 /dev/null monitoring/.env.tmp
            cat > monitoring/.env.tmp <<ENV
            GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
            GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
            DATA_SOURCE_NAME=${MONITORING_DATA_SOURCE_NAME}
            GF_ALERT_EMAIL_TO=${GF_ALERT_EMAIL_TO}
            ENV
            mv -f monitoring/.env.tmp monitoring/.env
            docker compose -f monitoring/docker-compose.monitoring.yaml pull
            docker compose -f monitoring/docker-compose.monitoring.yaml up -d --remove-orphans

            docker compose -f docker-compose.prod.yaml exec -T backend php artisan migrate --force
            docker compose -f docker-compose.prod.yaml exec -T backend php artisan config:cache

            echo "▶ [2/2] Déploiement front (app_frontend)…"
            docker compose -f docker-compose.prod.yaml up -d frontend

            probe() {
              local path="$1" i
              for i in $(seq 1 20); do
                if docker exec app_edge wget -q -T 5 -O- "http://127.0.0.1${path}" >/dev/null 2>&1; then
                  return 0
                fi
                sleep 3
              done
              return 1
            }
            smoke_test() {
              echo "▶ Smoke tests…"
              probe /up             || { echo "✗ /up KO";             return 1; }
              probe /api/articles   || { echo "✗ /api/articles KO";   return 1; }
              probe /api/categories || { echo "✗ /api/categories KO"; return 1; }
              probe /               || { echo "✗ / (front) KO";       return 1; }
              echo "✓ Smoke tests OK"
            }

            if ! smoke_test; then
              echo "❌ Smoke tests en échec."
              DHU="$(grep -E '^DOCKERHUB_USERNAME=' .env | cut -d= -f2- || true)"
              if [ -n "$DHU" ] && [ -n "$PREV_BACKEND_IMAGE" ] && [ -n "$PREV_FRONTEND_IMAGE" ]; then
                echo "↩ Rollback : re-déploiement des images back + front précédentes."
                docker tag "$PREV_BACKEND_IMAGE"  "${DHU}/${BACKEND_IMAGE}:latest"
                docker tag "$PREV_FRONTEND_IMAGE" "${DHU}/${FRONTEND_IMAGE}:latest"
                docker compose -f docker-compose.prod.yaml up -d --force-recreate backend nginx edge frontend
                if probe /up && probe /; then
                  echo "↩ Rollback appliqué (back + front, anciennes versions de nouveau en service)."
                else
                  echo "⚠ Rollback tenté mais la stack ne répond toujours pas (/up ou /)."
                fi
              else
                echo "⚠ Rollback impossible (image back/front précédente ou DOCKERHUB_USERNAME introuvable)."
              fi
              docker image prune -f
              exit 1
            fi

            docker image prune -f

      - name: 🏥 Health check production
        run: |
          sleep 20
          curl --fail --retry 5 --retry-delay 5 "${{ vars.PRODUCTION_URL }}/up"
