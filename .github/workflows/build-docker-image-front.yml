on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: "Docker image name (without DockerHub username prefix)"
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  build-and-scan-docker-front:
    name: 🐳 Frontend Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Build LOCAL uniquement (load: true, pas de push) : on scanne l'image
      # AVANT toute publication. Le push a lieu plus bas, seulement si le gate
      # Trivy passe → une image vulnérable n'atteint jamais le registre.
      - name: Build Docker image (local, pour scan)
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: ${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Download direct du binaire (CDN GitHub, sans API → pas de rate-limit).
      - name: Install Trivy CLI
        run: |
          TRIVY_VERSION=0.71.0
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version

      - name: Run Trivy scan for GitHub Security (SARIF, non bloquant)
        run: |
          trivy image \
            --format sarif \
            --output trivy-front-image-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-front-image-results.sarif') != ''
        with:
          sarif_file: "trivy-front-image-results.sarif"
          category: trivy-frontend-container-scan

      - name: 🚦 Trivy gate (blocking on CRITICAL/HIGH)
        run: |
          trivy image \
            --format table \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --scanners vuln \
            --exit-code 1 \
            ${{ inputs.app_name }}:${{ github.sha }}

      # ─── PUSH (uniquement si le gate Trivy ci-dessus a passé) ───
      # On pousse l'image LOCALE déjà buildée (docker tag + push), sans rebuild.
      # Remplace l'ancien save/upload → download/load côté publish : plus rapide,
      # pas d'artifact tar.gz de plusieurs centaines de Mo.
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push Docker image
        run: |
          docker tag ${{ inputs.app_name }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}
          docker tag ${{ inputs.app_name }}:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.app_name }}:latest
