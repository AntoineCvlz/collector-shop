on:
  workflow_call:

permissions:
  contents: read

jobs:
  unused-deps-front:
    name: Unused Deps Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧹 depcheck — bloquant
        run: npx --yes depcheck
