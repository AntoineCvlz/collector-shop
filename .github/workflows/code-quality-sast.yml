on:
  workflow_call:
    secrets:
      SEMGREP_APP_TOKEN:
        required: false

jobs:
  code-quality-sast:
    name: Security & Quality Scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # ═══════════════════════════════════════
      # 1. PRÉPARATION PHP (Léger)
      # ═══════════════════════════════════════
      - name: 🐘 Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2, pint

      # ═══════════════════════════════════════
      # 2. LARAVEL PINT (Qualité de code)
      # ═══════════════════════════════════════
      - name: 🎨 Check Code Style (Pint)
        run: pint --test

      # ═══════════════════════════════════════
      # 3. SEMGREP
      # ═══════════════════════════════════════
      - name: 🔍 Run Semgrep SAST
        if: always()
        run: |
          pip install semgrep --break-system-packages
          semgrep scan --config="p/php" --config="p/security-audit" --config="p/secrets" --sarif --output=semgrep.sarif || true
          test -f semgrep.sarif || echo '{"version":"2.1.0","runs":[]}' > semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

      - name: 📤 Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('backend/semgrep.sarif') != ''
        with:
          sarif_file: backend/semgrep.sarif
          category: semgrep

      # ═══════════════════════════════════════
      # 4. COMPOSER AUDIT (Sécurité Dépendances)
      # ═══════════════════════════════════════
      - name: 📦 Check PHP Dependencies Security
        run: composer audit
        continue-on-error: true