# Datasource Prometheus auto-provisionnée au démarrage de Grafana.
# (joint Prometheus par son nom de conteneur sur le réseau "monitoring")
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus     # uid stable, référencé par les dashboards provisionnés
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
