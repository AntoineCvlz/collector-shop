server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Ne pas divulguer la version de nginx (Server: nginx/x.y.z → Server: nginx).
    server_tokens off;

    # ── En-têtes de sécurité (durcissement DAST/ZAP) ──────────────────
    # Appliqués à toutes les réponses, y compris les pages d'erreur (always).
    #
    # CSP : le SPA ne charge que ses propres assets + les polices Google Fonts.
    # 'unsafe-inline' pour style-src est nécessaire aux styles inline générés par
    # Vite/React ; on garde script-src strict ('self').
    # connect-src 'self' : l'API est same-origin en prod (/api via l'edge). Si un
    # jour VITE_API_BASE_URL pointe vers une origine externe, l'ajouter ici.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # NB : pas de Cross-Origin-Embedder-Policy: require-corp — il bloquerait le
    # chargement des polices Google Fonts (pas d'en-tête CORP côté fonts.gstatic.com).

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
