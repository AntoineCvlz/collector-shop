on:
  workflow_call:
    inputs:
      app_name:
        required: true
        type: string
        description: "Docker image name (without DockerHub username prefix)"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  build-and-scan-docker:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: ${{ inputs.app_name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Trivy via apt
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy scan for GitHub Security
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH,MEDIUM \
            --exit-code 0 \
            --ignore-unfixed=false \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Upload scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
          category: trivy-container-scan

      - name: Run Trivy scan (display results)
        continue-on-error: true
        run: |
          trivy image \
            --format table \
            --exit-code 0 \
            --severity CRITICAL,HIGH \
            --scanners vuln \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Run Trivy scan (blocking on CRITICAL vulnerabilities)
        run: |
          trivy image \
            --format table \
            --exit-code 1 \
            --ignore-unfixed \
            --severity CRITICAL \
            --scanners vuln \
            ${{ inputs.app_name }}:${{ github.sha }}

      - name: Save Docker image as archive
        run: docker save ${{ inputs.app_name }}:${{ github.sha }} | gzip > docker-image.tar.gz

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ inputs.app_name }}-${{ github.sha }}
          path: docker-image.tar.gz
          retention-days: 1
