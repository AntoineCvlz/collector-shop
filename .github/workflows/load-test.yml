on:
  workflow_call:

jobs:
  load-test:
    name: 🏋️ Load & Perf Test (k6)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # REQUIS : PRODUCTION_URL est une variable scopée à l'environnement
    # "production" — seul un job déclarant cet environnement peut la lire.
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Create k6 reports directory
        run: |
          mkdir -p ${{ github.workspace }}/k6-reports
          chmod -R 777 ${{ github.workspace }}/k6-reports

      # Garde-fou : une target_url vide (ex. variable GitHub non résolue) ferait
      # taper k6 sur "http://localhost" → 0 donnée, tous les checks en échec.
      - name: Validate target URL
        env:
          TARGET_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          echo "Cible du test de charge : '${TARGET_URL}'"
          if [ -z "${TARGET_URL}" ]; then
            echo "::error::PRODUCTION_URL est vide — vérifier la variable de l'environnement production."
            exit 1
          fi
          # Sanity check : la prod répond bien avant de lancer la charge.
          curl --fail --silent --show-error --max-time 15 "${TARGET_URL}/up" \
            || { echo "::error::La cible ${TARGET_URL}/up ne répond pas — abandon du test de charge."; exit 1; }

      # Charge courte et modérée contre la prod réelle, juste après déploiement
      # (cf. backend/tests/Load/api-smoke-load.js) — seuils dans `options.thresholds`
      # du script ; --summary-export produit un résumé JSON pour le gate ci-dessous.
      - name: Run k6 load test against production
        env:
          TARGET_URL: ${{ vars.PRODUCTION_URL }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/backend/tests/Load:/scripts:ro \
            -v ${{ github.workspace }}/k6-reports:/reports:rw \
            -e LOAD_TEST_BASE_URL="${TARGET_URL}" \
            grafana/k6:latest run \
            --summary-export /reports/k6-summary.json \
            /scripts/api-smoke-load.js
        continue-on-error: true

      - name: Verify k6 actually ran
        run: |
          test -s "${{ github.workspace }}/k6-reports/k6-summary.json" \
            || { echo "::error::k6 n'a produit aucun résumé — le test de charge n'a pas eu lieu."; exit 1; }

      # Gate : échoue si un des seuils définis dans le script (p95, taux d'erreur)
      # n'est pas respecté. Non bloquant pour le déploiement lui-même (déjà fait),
      # mais fait échouer la pipeline pour signaler la régression de perf.
      - name: 🚦 k6 thresholds gate
        run: |
          REPORT="${{ github.workspace }}/k6-reports/k6-summary.json"
          # Dans --summary-export, chaque seuil est un booléen (true = respecté,
          # false = échoué), PAS un objet { ok: … } → on teste .value == false.
          FAILED=$(jq '[.metrics | to_entries[] | select(.value.thresholds != null) | .value.thresholds | to_entries[] | select(.value == false)] | length' "$REPORT")
          echo "Seuils k6 en échec : ${FAILED}"
          if [ "${FAILED:-0}" -gt 0 ]; then
            echo "::error::Test de charge : ${FAILED} seuil(s) de performance non respecté(s) — voir l'artifact k6-load-test-report."
            jq -r '.metrics | to_entries[] | select(.value.thresholds != null) | .key as $m | .value.thresholds | to_entries[] | select(.value == false) | "  - \($m): \(.key)"' "$REPORT"
            exit 1
          fi
          echo "✓ Tous les seuils de performance sont respectés."

      - name: Upload k6 report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: k6-load-test-report
          path: k6-reports/k6-summary.json
